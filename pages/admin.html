<div class="row content">
    <div class="scoreboard-panel bank-scoreboard-panel">
        <div class="placeholder-hero section-title-panel bank-scoreboard-hero">
            <h1>ГЕРЦЫ ЛЕГИОНОВ</h1>
        </div>

        <section class="placeholder-card table-card bank-table-card">
            <div class="table-responsive bank-table-responsive">
                <table class="table elegant-table bank-table bank-scoreboard-table">
                    <thead>
                        <tr>
                            <th>НАЗВАНИЕ ЛЕГИОНА:</th>
                            <th>Итого:</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for row in scoreboard %}
                        <tr>
                            <td data-label="Легион">{{ row.Name }}</td>
                            <td data-label="Итого">{{ row.Scores }}</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </section>
    </div>
</div>
