<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Авторизация</title>

    <link href="/css/bootstrap.min.css" rel="stylesheet">
    <script src="/js/bootstrap.min.js"></script>
    <script src="/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="/css/style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container-fluid text-center">
        <div class="row header white"></div>

        <div class="row justify-content-center align-items-center login-layout">
            <div class="col-10 col-sm-8 col-md-5 col-lg-4 text-center">
                <img src="/static/logo.png" title="logo" alt="logo" width="220" height="220" class="img-fluid login-logo">
            </div>

            <div class="col-11 col-sm-10 col-md-7 col-lg-4">
                <form action="/signin" method="post">
                    <h1 class="text-center">Авторизация</h1>

                    <div class="form-outline mb-4 text-start">
                        <label class="form-label" for="login">Логин</label>
                        <input type="text" name="login" id="login" class="form-control" placeholder="Введите свой логин">
                    </div>

                    <div class="form-outline mb-4 text-start">
                        <label class="form-label" for="password">Пароль</label>
                        <input type="password" name="password" id="password" class="form-control" placeholder="Введите пароль">
                    </div>

                    {% with messages = get_flashed_messages() %}
                        {% if messages %}
                            {% for msg in messages %}
                                <p class="msg">{{ msg }}</p>
                            {% endfor %}
                        {% endif %}
                    {% endwith %}

                    <button type="submit" class="btn btn-primary w-100 mb-4">Войти</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
