<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIC - Герцы ЛЕГИОНА</title>

    <link href="/css/bootstrap.min.css" rel="stylesheet">
    <script src="/js/bootstrap.min.js"></script>
    <script src="/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="/css/style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container-fluid text-center" id="header">
        <div class="row header white cartheader">
            <div class="menu-toolbar">
                <button
                    class="btn menu-toggle-button"
                    id="menuToggleButton"
                    type="button"
                    aria-expanded="false"
                    aria-controls="mainMenuCollapse"
                >
                    Меню
                </button>
            </div>

            <ul class="nav justify-content-end" id="user-controls">
                <li class="nav-item">
                    <a class="nav-link disabled" href="#">
                        <span class="badge text-bg-info">{{ user.view }}</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/logout">Выход</a>
                </li>
            </ul>

            <div class="menu-collapse" id="mainMenuCollapse">
                <ul class="nav section-nav" id="main-sections">
                    <li class="nav-item main-nav-item">
                        <a class="nav-link {% if active_section == 'home' %}active{% endif %}" href="/home">Главная</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if active_section == 'studios' %}active{% endif %}" href="/studios">Студии</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if active_section == 'history' %}active{% endif %}" href="/history">История</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if active_section == 'bonus' %}active{% endif %}" href="/bonus">Бонусная система</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if active_section == 'bank' %}active{% endif %}" href="/teams">Банк</a>
                    </li>
                    {% if is_admin %}
                    <li class="nav-item">
                        <a class="nav-link {% if active_section == 'approve' %}active{% endif %}" href="/approve">Approve</a>
                    </li>
                    {% endif %}
                    <li class="nav-item menu-extra-item">
                        <a class="nav-link" href="/logout">Выход</a>
                    </li>
                </ul>
            </div>
        </div>
    </div>
    <div class="container">
